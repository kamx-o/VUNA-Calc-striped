name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: vuna-calc:ci

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy files
        run: |
          mkdir -p deploy
          cp index.html deploy/
          cp -r assets deploy/

      - name: Debug FTP connection
        env:
          HOST: ${{ secrets.FTP_HOST }}
          USER: ${{ secrets.FTP_USERNAME }}
          PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 << 'EOF'
import ftplib, os
try:
    ftp = ftplib.FTP()
    ftp.connect(os.environ['HOST'], 21, timeout=10)
    print('Connected OK')
    print('Server:', ftp.getwelcome())
    ftp.login(os.environ['USER'], os.environ['PASS'])
    print('Login OK')
    print('PWD:', ftp.pwd())
    ftp.quit()
except Exception as e:
    print(f'Error: {e}')
    exit(1)
EOF
      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: deploy/
          server-dir: public_html/

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: vuna-calc:ci

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy files
        run: |
          mkdir -p deploy
          cp index.html deploy/
          cp -r assets deploy/

      - name: Debug FTP connection
        env:
          HOST: ${{ secrets.FTP_HOST }}
          USER: ${{ secrets.FTP_USERNAME }}
          PASS: ${{ secrets.FTP_PASSWORD }}
        run: printf 'import ftplib, os, sys\nftp = ftplib.FTP_TLS()\nftp.connect(os.environ["HOST"], 21, timeout=10)\nprint("Step 1: Connected")\nprint("Banner:", ftp.getwelcome())\nprint("Step 2: Sending auth...")\nftp.auth()\nprint("Step 3: Auth ok, logging in...")\nftp.login(os.environ["USER"], os.environ["PASS"])\nprint("Step 4: Login ok")\nftp.prot_p()\nprint("Step 5: Prot_p ok")\nprint("PWD:", ftp.pwd())\nftp.quit()\n' | python3 || printf 'import ftplib, os, sys\nftp = ftplib.FTP()\nftp.connect(os.environ["HOST"], 21, timeout=10)\nprint("Plain FTP connected")\nftp.login(os.environ["USER"], os.environ["PASS"])\nprint("Plain login ok")\nftp.quit()\n' | python3
      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: deploy/
          server-dir: public_html/
          security: strict
